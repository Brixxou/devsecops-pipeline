name: Pipeline DevSecOps

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: devsecops-web
  IMAGE_TAG: latest

jobs:

  # ------------------------------------------------------------------
  # ETAPE 1 : SECRETS (TruffleHog)
  # Scanne l'historique Git pour détecter des secrets exposés
  # ------------------------------------------------------------------
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan des Secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ------------------------------------------------------------------
  # ETAPE 2 : LINTER (PHP_CodeSniffer)
  # Vérifie le respect des conventions PSR-12
  # ------------------------------------------------------------------
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Linter PHP (PHP_CodeSniffer PSR-12)
        run: |
          docker run --rm -v "$(pwd)/src":/data cytopia/phpcs --standard=PSR12 --ignore=vendor/* /data
        continue-on-error: true

  # ------------------------------------------------------------------
  # ETAPE 3 : SAST (Semgrep)
  # Analyse statique du code source - détection XSS, SQLi, RCE
  # ------------------------------------------------------------------
  sast-analysis:
    needs: [check-secrets, check-quality]
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Scan SAST (Semgrep)
        run: semgrep scan --config=p/php --error --verbose
        continue-on-error: true

  # ------------------------------------------------------------------
  # ETAPE 4 : SCA (Trivy FS)
  # Analyse des dépendances (composer.lock) pour les CVE connues
  # ------------------------------------------------------------------
  sca-analysis:
    needs: [check-secrets, check-quality]
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation des dépendances
        run: |
          docker run --rm -v "$PWD/src":/app composer install --ignore-platform-reqs

      - name: Scan SCA (Trivy FS)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './src'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ------------------------------------------------------------------
  # ETAPE 5 : INFRASTRUCTURE (Trivy Image)
  # Scan de l'image Docker pour les vulnérabilités système
  # ------------------------------------------------------------------
  infra-analysis:
    needs: [sast-analysis, sca-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./src

      - name: Scan Infrastructure (Trivy Image)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: '${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ------------------------------------------------------------------
  # ETAPE 6 : DAST (ZAP Baseline)
  # Scan boîte noire de l'application en cours d'exécution
  # ------------------------------------------------------------------
  dast-analysis:
    needs: [infra-analysis]
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Démarrage de la stack applicative
        run: |
          docker compose up -d --build
          echo "Attente du démarrage des services..."
          sleep 15

      - name: Scan DAST (ZAP Baseline)
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: ''
          allow_issue_writing: false
        continue-on-error: true

      - name: Arrêt de la stack
        if: always()
        run: docker compose down

  # ------------------------------------------------------------------
  # ETAPE 7 : SIGNATURE D'IMAGE (Cosign - Partie 10)
  # Signe cryptographiquement l'image validée par le pipeline
  # ------------------------------------------------------------------
  sign-image:
    needs: [dast-analysis]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push de l'image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} ./src
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Signature de l'image (Cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          cosign sign --yes ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Vérification de la signature
        run: |
          cosign verify \
            --certificate-identity-regexp=".*" \
            --certificate-oidc-issuer-regexp=".*" \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
